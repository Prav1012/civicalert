version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: civicalert
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports: ["5432:5432"]

  ipfs:
    image: ipfs/kubo:latest
    ports:
      - "4001:4001"
      - "5001:5001"
      - "8080:8080"

  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: ./backend/.env
    depends_on: [db, ipfs]

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    depends_on: [backend]